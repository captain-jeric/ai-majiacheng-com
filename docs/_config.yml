theme: jekyll-theme-cayman
title: AI Majiacheng
description: 每日 AI 情报雷达
baseurl: ""
url: "https://ai.majiacheng.com"

# Build settings
markdown: kramdown
future: true # Allow future posts to be published
plugins:
  - jekyll-feed
feed:
  path: feed.xml
exclude:
  - ".github"
  - "node_modules"

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "default"
